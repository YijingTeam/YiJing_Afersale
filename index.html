<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奕境售后管理系统</title>
<style>
/* 最终清爽蓝色主题 */
body{ margin:0; padding:0; font-family:"Microsoft YaHei"; background:#f6f8fc; }
.main{ display:flex; min-height:100vh; }
.left-menu{ width:220px; background:#1F458E; color:white; }
.left-menu ul,.left-menu li{ list-style:none; margin:0; padding:0; }

.first-menu{
  display:block; padding:12px 18px;
  background:#183774; color:white;
  text-decoration:none; cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.second-menu{ display:none; }
.second-menu a{
  display:block; padding:10px 25px;
  background:#2954A6; color:white;
  text-decoration:none;
}
.third-menu{ display:none; }
.third-menu a{
  display:block; padding:10px 35px;
  background:#3667C8; color:white;
  text-decoration:none;
}

.content{ flex:1; padding:20px; }
.page{ display:none; }
.page.show{ display:block; }
</style>
</head>
<body>
<div class="main">
  <div class="left-menu">
   <!-- 顶部标题 -->
<div style="background:#1F458E; color:white; padding:14px 20px; font-size:16px; font-weight:bold;">
    奕境售后管理系统
</div>

<!-- 左侧菜单 -->
<div class="left-menu">
  <ul>
    <li><a class="first-menu">首页</a></li>
    <li>
      <a class="first-menu">商品管理</a>
      <ul class="second-menu">
        <li><a>商品列表</a></li>
        <li><a>商品分类</a></li>
      </ul>
    </li>
    <li>
      <a class="first-menu">库存管理</a>
      <ul class="second-menu">
        <li><a>库存查询</a></li>
        <li><a>入库管理</a></li>
        <li><a>出库管理</a></li>
      </ul>
    </li>
    <li>
      <a class="first-menu">备件管理</a>
      <ul class="second-menu">
        <li><a>备件信息</a>
          <ul class="third-menu">
            <li><a>备件列表</a></li>
            <li><a>备件入库</a></li>
            <li><a>备件出库</a></li>
          </ul>
        </li>
        <li><a>备件分类</a></li>
      </ul>
    </li>
    <li><a class="first-menu">工单管理</a></li>
    <li><a class="first-menu">报表统计</a></li>
    <li><a class="first-menu">系统设置</a></li>
  </ul>
</div>
    <div class="content">
      <div class="search">
        <input type="text" placeholder="备件名称">
        <button>搜索</button>
        <button>新增</button>
        <button>导出</button>
      </div>
      <table>
        <tr>
          <th>备件ID</th>
          <th>备件名称</th>
          <th>规格型号</th>
          <th>库存数量</th>
          <th>操作</th>
        </tr>
        <tr>
          <td>1001</td>
          <td>空调压缩机</td>
          <td>3P</td>
          <td>25</td>
          <td>查看 编辑 删除</td>
        </tr>
      </table>
    </div>
  </div>
</div>
  <script>
// 菜单展开/收起
document.querySelectorAll('.first-menu').forEach(el => {
  el.onclick = () => {
    let sub = el.nextElementSibling;
    if(sub) sub.style.display = sub.style.display=='block'?'none':'block';
  }
})
document.querySelectorAll('.second-menu a').forEach(el => {
  el.onclick = (e) => {
    e.stopPropagation();
    let sub = el.nextElementSibling;
    if(sub) sub.style.display = sub.style.display=='block'?'none':'block';
  }
})
</script>
  <script>
// 菜单展开收起
document.querySelectorAll('.first-menu').forEach(el => {
  el.onclick = () => {
    let sub = el.nextElementSibling;
    if (sub && sub.classList.contains('second-menu')) {
      sub.style.display = sub.style.display=='block'?'none':'block';
    }
  }
})
document.querySelectorAll('.second-menu > li > a').forEach(el => {
  el.onclick = (e) => {
    e.stopPropagation();
    let sub = el.nextElementSibling;
    if (sub && sub.classList.contains('third-menu')) {
      sub.style.display = sub.style.display=='block'?'none':'block';
    }
  }
})
</script>
  <script>
// 一级菜单展开/收起
document.querySelectorAll('.first-menu').forEach(function (el) {
  el.addEventListener('click', function () {
    let sub = this.nextElementSibling;
    if (sub && sub.classList.contains('second-menu')) {
      sub.style.display = (sub.style.display === 'block' ? 'none' : 'block');
    }
  });
});

// 三级菜单展开/收起
document.querySelectorAll('.second-menu a').forEach(function (el) {
  el.addEventListener('click', function (e) {
    e.stopPropagation();
    let sub = this.nextElementSibling;
    if (sub && sub.classList.contains('third-menu')) {
      sub.style.display = (sub.style.display === 'block' ? 'none' : 'block');
    }
  });
});
</script>
</body>
</html>
