<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奕境售后管理系统</title>
  <style>
    :root {
      --primary-color: #861B2F;
      --sidebar-bg: #F5F7FA;
      --sidebar-text: #333;
      --sidebar-hover: rgba(134, 27, 47, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* 侧边导航栏 */
    .sidebar {
      width: 220px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
      position: fixed;
      height: 100vh;
      z-index: 100;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }

    .sidebar.collapsed {
      width: 50px;
    }

    /* 系统标题 */
    .system-title {
      padding: 20px 15px;
      font-size: 16px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-align: center;
    }

    .sidebar.collapsed .system-title {
      font-size: 0;
      padding: 20px 0;
    }

    /* 导航菜单 */
    .nav-menu {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .nav-item {
      cursor: pointer;
      transition: background 0.2s;
    }

    .nav-item:hover {
      background: var(--sidebar-hover);
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 15px;
      color: var(--sidebar-text);
      text-decoration: none;
      font-size: 15px;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nav-text {
      flex: 1;
      white-space: nowrap;
    }

    .nav-arrow {
      width: 16px;
      height: 16px;
      transition: transform 0.3s;
      position: relative;
    }

    .nav-arrow::before,
    .nav-arrow::after {
      content: '';
      position: absolute;
      top: 5px;
      width: 8px;
      height: 1.5px;
      background: #999;
      border-radius: 1px;
    }

    .nav-arrow::before {
      left: 1px;
      transform: rotate(45deg);
    }

    .nav-arrow::after {
      right: 1px;
      transform: rotate(-45deg);
    }

    .nav-link:hover .nav-arrow::before,
    .nav-link:hover .nav-arrow::after {
      background: var(--primary-color);
    }

    .sidebar.collapsed .nav-text,
    .sidebar.collapsed .nav-arrow {
      display: none;
    }

    .sidebar.collapsed .nav-link {
      justify-content: center;
      padding: 15px 10px;
    }

    /* 子菜单 */
    .submenu {
      background: #ebeef2;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .submenu.open {
      max-height: 500px;
    }

    .submenu-item {
      padding: 12px 15px 12px 51px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submenu-item:hover {
      background: var(--sidebar-hover);
    }

    .sidebar.collapsed .submenu {
      display: none;
    }

    /* 嵌套子菜单 */
    .submenu-nested {
      background: #dde0e5;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .submenu-nested.open {
      max-height: 200px;
    }
    .submenu-item-nested {
      padding: 10px 15px 10px 68px;
      font-size: 13px;
    }

    /* 底部收起按钮 */
    .toggle-btn {
      padding: 16px;
      text-align: center;
      cursor: pointer;
      border-top: 1px solid #ddd;
      background: #e8ecf0;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .toggle-btn:hover {
      background: var(--primary-color);
      color: #fff;
    }

    .toggle-icon svg {
      display: block;
    }

    .sidebar.collapsed .toggle-icon {
      transform: scaleX(-1);
    }

    /* 主内容区 */
    .main
